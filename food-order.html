<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Food Order</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Tailwind -->
<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100">

<div class="container py-5">

<h1 class="text-center text-4xl font-bold text-primary mb-4">
🍔 Food Ordering System
</h1>

<div class="card shadow-lg p-4">

<h4>Select Items</h4>

<div class="row g-3">

<div class="col-md-6">
<label>Burger (₱80)</label>
<input type="number" id="burgerQty" class="form-control" min="0" value="0">
</div>

<div class="col-md-6">
<label>Fries (₱45)</label>
<input type="number" id="friesQty" class="form-control" min="0" value="0">
</div>

<div class="col-md-6">
<label>Pizza (₱150)</label>
<input type="number" id="pizzaQty" class="form-control" min="0" value="0">
</div>

<div class="col-md-6">
<label>Spaghetti (₱60)</label>
<input type="number" id="spaghettiQty" class="form-control" min="0" value="0">
</div>

</div>

<hr>

<div class="mb-3">
<label>Enter Cash</label>
<input type="number" id="cash" class="form-control">
</div>

<button onclick="calculateOrder()" class="btn btn-success w-100">
Calculate Order
</button>

</div>

<!-- Receipt -->
<div class="card shadow-lg p-4 mt-4">
<h4>🧾 Receipt</h4>

<table class="table table-bordered mt-3">
<thead class="table-dark">
<tr>
<th>Item</th>
<th>Qty</th>
<th>Price</th>
<th>Total</th>
</tr>
</thead>

<tbody id="receiptItems"></tbody>

</table>

<p id="summary" class="text-lg font-semibold"></p>

</div>

</div>

<script>

function calculateOrder(){

const prices = {
burger: 80,
fries: 45,
pizza: 150,
spaghetti: 60
};

let burgerQty = Number(document.getElementById("burgerQty").value);
let friesQty = Number(document.getElementById("friesQty").value);
let pizzaQty = Number(document.getElementById("pizzaQty").value);
let spaghettiQty = Number(document.getElementById("spaghettiQty").value);

let itemsHTML = "";

let total = 0;

function addItem(name, qty, price){

if(qty > 0){

let itemTotal = qty * price;
total += itemTotal;

itemsHTML += `
<tr>
<td>${name}</td>
<td>${qty}</td>
<td>₱${price}</td>
<td>₱${itemTotal}</td>
</tr>
`;

}

}

addItem("Burger", burgerQty, prices.burger);
addItem("Fries", friesQty, prices.fries);
addItem("Pizza", pizzaQty, prices.pizza);
addItem("Spaghetti", spaghettiQty, prices.spaghetti);

document.getElementById("receiptItems").innerHTML = itemsHTML;

let cash = Number(document.getElementById("cash").value);
let change = cash - total;

let summary = `
Total: ₱${total} <br>
Cash: ₱${cash} <br>
`;

if(change < 0){
summary += `<span class="text-danger">Insufficient Funds</span>`;
}else{
summary += `Change: ₱${change}`;
}

document.getElementById("summary").innerHTML = summary;

}

</script>

</body>
</html>
